# Edit this to match your Jetson. Used by orchestrate/ssh_client.py.
jetson:
  host: 192.168.55.1
  user: CVAR           
  ssh_key: ~/.ssh/id_ed25519
  remote_workdir: /home/CVAR/lut_runner
  docker_image: lut-runner:latest
  power_mode: 0      # read by scripts/setup_jetson.sh (nvpmodel -m), not Python
  lock_clocks: true  # read by scripts/setup_jetson.sh (jetson_clocks), not Python

sweep:
  # precision is NOT part of row_key (lut/docs/schema.md): rows of different
  # precisions coexist under the same key, and resume is precision-aware —
  # changing this value re-measures every row rather than skipping.
  precision: fp32
  warmup_iters: 50
  timed_iters: 200
  output_jsonl: data/lut.jsonl
  device_info_json: data/device_info.json
