name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies (CPU torch)
        # --extra-index-url, NOT --index-url: fabric/onnx/etc. live on PyPI;
        # only torch should resolve from the CPU wheel index (same pattern as
        # scripts/setup_laptop.sh).
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            -r requirements.txt -r requirements-dev.txt

      - name: ruff
        run: python -m ruff check .

      - name: mypy
        run: python -m mypy

      - name: pytest (fast lane)
        # "slow" = full-catalog dummy-LUT regeneration; data/lut.jsonl and the
        # ofa package aren't present on CI, so those tests skip by design.
        run: python -m pytest -m "not slow" -ra
