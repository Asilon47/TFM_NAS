notes: |
  Phase 0 (Jetson LUT), CP 1.1 (skeleton + deps), CP 1.2 (OFA
  checkpoint download + hash pin), and CP 1.3 (subnet sampler) are
  complete. `python -m supernet.sampler` materialises a random
  subnet from the cached MBv3-w1.0 checkpoint and forwards
  (1, 3, 224, 224) → (1, 1000); param counts span ~3.4M (min arch)
  to ~7.7M (max arch).

  CP 1.3 added `Pillow` and `torchvision` to `requirements-nas.txt`
  (transitive deps of the elastic_nn import chain via
  `ofa.utils.my_dataloader`). CP 1.2's "what's next" guess
  (gdown + Pillow) was wrong: gdown is only needed by
  `ofa.model_zoo`, which we deliberately bypass — see
  `supernet/README.md`.

  **Venv-refresh gotcha:** a plain
  `pip install -r requirements-nas.txt` lands on PyPI's CUDA-13
  torchvision wheel and breaks at import with `libcudart.so.13: not
  found` (torch is `+cu128`). Always install via
  `bash scripts/setup_laptop_nas.sh`, which passes
  `--extra-index-url https://download.pytorch.org/whl/cu128` so the
  matching `torchvision==0.26.0+cu128` wheel is selected.

  **CP 2.1 done (2026-06-06):** `search/arch_to_blocks.py` translates
  an OFA arch_dict into the ordered `(mbconv, cfg, input_shape)` list
  the LUT is keyed on. Found that the LUT's generic MBConv widths
  didn't cover OFA's real blocks, so added `catalog/ofa_mbv3.py` (the
  shared macro-topology + `reachable_mbconv_configs()` → 91 configs)
  and unioned those into the catalog grid (mbconv 2016→2107).
  Regenerated the dummy LUT (2710 rows). DoD passes for 10 random
  archs and one real `supernet.sampler` arch (0 missing keys). See
  `procedure.md` CP 2.1.

  CP 1.4 — ImageNet sanity (top-1 within 1.5 % of OFA's published
  number) — still OPEN, deferred. Blocked on D1 (target dataset) for
  the long-term harness, but its 2k-image ImageNet-val smoke-test can
  run independently of D1.

  **Repo reorganized 2026-06-06** (LUT-only → full project):
  `bench/`→`lut/bench/`, `export/`→`lut/export/`,
  `orchestrate/`→`lut/orchestrate/`, `docs/`→`lut/docs/`, and
  `ofa_extractor/`→`supernet/` (the latter renamed to avoid shadowing
  the pip-installed `ofa` package). Added `CLAUDE.md`. Module
  invocations are now `python -m lut.orchestrate.*` and
  `python -m supernet.*`.

  **Known blocker (CUDA):** `torch.cuda.is_available()` is False on
  this machine and `nvidia-smi` is not on PATH (unchanged since
  CP 1.1). Fine-tuning from CP 2.4 onward needs a working CUDA
  driver. Near-term checkpoints (1.4 inference-only, 2.1, 2.2) do
  NOT need CUDA. Deferred — resolve before CP 2.4.

  **Plan extended 2026-06-10:** added **Phase 8 — Knowledge
  Distillation** (distill the search winner α* against an external SOTA
  teacher → final deployable weights); the former Phase 8 (Deployment
  Packaging) is renumbered to **Phase 9**. Decisions taken via
  AskUserQuestion: (1) distillation is a standalone phase placed
  *before* deployment (ML-correct: deploy the distilled weights), not
  after; (2) the teacher is an external SOTA pretrained model, chosen at
  CP 8.1 to match D1. Roadmap change only — `current_checkpoint` /
  `completed` are unchanged (still CP 2.1); the new phase is future work
  gated on the same CUDA blocker as CP 2.4+. See `PROJECT_PLAN.md`
  Phase 8 and the plan-amendment entry in `procedure.md`.
