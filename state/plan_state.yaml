  `pip install -r requirements-nas.txt` lands on PyPI's CUDA-13
  torchvision wheel and breaks at import with `libcudart.so.13: not
  found` (torch is `+cu128`). Always install via
  `bash scripts/setup_laptop_nas.sh`, which passes
  `--extra-index-url https://download.pytorch.org/whl/cu128` so the
  matching `torchvision==0.26.0+cu128` wheel is selected.

